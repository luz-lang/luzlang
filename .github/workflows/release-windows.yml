name: Release Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build luzc.exe
        run: |
          cmake -B compiler/build -S compiler
          cmake --build compiler/build --config Release

      - name: Set up Python (for ray.exe)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build ray.exe (package manager — still Python)
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name ray ray.py

      - name: Copy luzc.exe to dist/
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item compiler\build\Release\luzc.exe dist\luzc.exe
          Copy-Item compiler\runtime\luz_rt.c dist\luz_rt.c

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Compile installer
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            installer\luz_installer.iss

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/luz-*-windows-x64.exe
