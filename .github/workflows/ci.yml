name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pylint llvmlite

      - name: Build Luz C runtime
        run: make -C luz/runtime

      - name: Run test suite
        run: pytest tests/test_suite.py -v

      - name: Lint
        run: pylint luz/ --fail-under=9.0

      - name: Run examples
        run: |
          python main.py examples/02_fizzbuzz.luz
          python main.py examples/03_fibonacci.luz
          python main.py examples/04_bubble_sort.luz
          python main.py examples/06_strings.luz
          python main.py examples/08_primes.luz
          python main.py examples/09_collections.luz
          python main.py examples/10_error_handling.luz
          python main.py examples/16_closures.luz
          python main.py examples/17_lambdas.luz
          python main.py examples/18_bound_methods.luz
          python main.py examples/19_dot_methods.luz
          python main.py examples/20_data_structures.luz
          python main.py examples/21_algorithms.luz
          python main.py examples/22_nullable_types.luz
