name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pylint llvmlite

      - name: Build Luz C runtime
        run: make -C luz/runtime

      - name: Run test suite
        run: pytest tests/test_suite.py -v

      - name: Lint
        run: pylint luz/ --fail-under=9.0

      # Examples execution is covered by tests/test_suite.py, which already
      # compiles + runs programs through luzc and skips gracefully when the
      # LLVM backend is broken on the host (see the smoke-test in test_suite.py).
      # Running them again here would double-fail on any backend issue.
