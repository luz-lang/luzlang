name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang

      - name: Configure
        run: cmake -B compiler/build -S compiler -DCMAKE_BUILD_TYPE=Release

      - name: Build luzc
        run: cmake --build compiler/build --parallel

      - name: Run C++ test suite
        run: ctest --test-dir compiler/build --output-on-failure

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run Python test suite
        run: pytest tests/test_suite.py -v
        # typecheck tests use luzc --check-json (no clang needed)
        # runtime tests use luzc --run (needs clang, installed above)
